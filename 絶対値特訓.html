<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>絶対値 特訓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFBF7; --grid:#DCE8EC; --ink:#26343F; --ink-soft:#5A6B77;
  --pen-blue:#3B6EA5; --pen-blue-deep:#2C5480;
  --red:#E0402A; --red-soft:#FBE9E5; --marker:#FFF3C1;
  --card:#FFFFFF; --line:#E3E9E5; --radius:14px;
  --shadow:0 2px 10px rgba(38,52,63,.08);
  --fd:'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif;
  --fb:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--fb);color:var(--ink);font-size:16px;line-height:1.65;
  background:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),var(--paper);
  background-size:22px 22px;
}
#app{max-width:560px;margin:0 auto;padding:16px 16px 46px;min-height:100vh}
.header{display:flex;align-items:baseline;gap:10px;padding:8px 2px 14px}
.header h1{font-family:var(--fd);font-weight:900;font-size:24px}
.header h1 .roma{color:var(--red)}
.header .tag{font-size:12px;color:var(--ink-soft)}

.statsbar{display:flex;gap:10px;margin-bottom:16px}
.statcard{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow)}
.statcard .num{font-family:var(--fd);font-weight:900;font-size:22px;color:var(--pen-blue-deep)}
.statcard .num b{color:var(--red)}
.statcard .lbl{font-size:11px;color:var(--ink-soft)}

.groupttl{font-family:var(--fd);font-weight:900;font-size:14px;color:var(--pen-blue-deep);margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
.groupttl::after{content:"";flex:1;height:2px;background:repeating-linear-gradient(90deg,var(--pen-blue-deep) 0 6px,transparent 6px 11px);opacity:.35}
.groupsub{font-size:11.5px;color:var(--ink-soft);margin:-6px 2px 10px}

.bigbtn{width:100%;border:none;border-radius:var(--radius);padding:14px;font-family:var(--fd);font-weight:700;font-size:16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s;margin-bottom:10px}
.bigbtn:active{transform:scale(.98)}
.bigbtn.blue{background:var(--pen-blue);color:#fff}
.bigbtn.ghost{background:#fff;color:var(--pen-blue-deep);border:2px solid var(--pen-blue)}

.qitem{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow);position:relative}
.qitem .no{font-family:var(--fd);font-weight:700;font-size:12px;color:var(--ink-soft);min-width:26px}
.qitem .qinfo{flex:1;min-width:0}
.qitem .qmini{font-size:14.5px;font-weight:600}
.hanko{font-family:var(--fd);font-weight:900;color:var(--red);border:2.5px solid var(--red);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:11px;transform:rotate(-12deg);opacity:.9;flex-shrink:0;background:rgba(224,64,42,.04)}

.qtop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.backbtn{border:none;background:transparent;color:var(--pen-blue-deep);font-family:var(--fd);font-weight:700;font-size:14px;cursor:pointer;padding:6px 4px}
.qtheme{font-family:var(--fd);font-weight:700;font-size:14px;flex:1;text-align:center;color:var(--ink-soft)}
.qcount{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--pen-blue-deep)}
.progressline{height:6px;background:#E7EDE9;border-radius:99px;overflow:hidden;margin-bottom:18px}
.progressline i{display:block;height:100%;background:var(--pen-blue);border-radius:99px;transition:width .3s}

.qcard{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:22px 18px;box-shadow:var(--shadow);margin-bottom:14px}
.qlabel{position:absolute;top:-11px;left:14px;background:var(--pen-blue-deep);color:#fff;font-family:var(--fd);font-weight:700;font-size:12px;border-radius:99px;padding:2px 12px}
.qtext{font-size:18px;font-weight:600;text-align:center}
.qhint{font-size:12.5px;color:var(--ink-soft);margin-top:8px;text-align:center}
.markwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.markwrap svg{width:100px;height:100px;overflow:visible}
.mark-o{stroke:var(--red);stroke-width:7;fill:none;stroke-linecap:round;stroke-dasharray:320;stroke-dashoffset:320;animation:draw .5s ease-out forwards;opacity:.9}
.mark-x{stroke:var(--red);stroke-width:7;fill:none;stroke-linecap:round;stroke-dasharray:120;stroke-dashoffset:120;animation:draw .35s ease-out forwards;opacity:.9}
@keyframes draw{to{stroke-dashoffset:0}}
@media (prefers-reduced-motion:reduce){.mark-o,.mark-x{animation:none;stroke-dashoffset:0}*{transition:none!important}}

.choices{display:flex;flex-direction:column;gap:9px}
.choice{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:12px;padding:13px 15px;font-size:16.5px;font-weight:500;cursor:pointer;font-family:var(--fb);transition:transform .08s,border-color .15s,background .15s}
.choice:active{transform:scale(.985)}
.choice .ck{font-family:var(--fd);font-weight:700;font-size:12px;color:var(--ink-soft);border:1.5px solid var(--line);border-radius:8px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice.correct{border-color:var(--red);background:var(--red-soft)}
.choice.correct .ck{background:var(--red);border-color:var(--red);color:#fff}
.choice.wrongpick{border-color:#B9C4CC;background:#F2F5F3;opacity:.75}
.choice.dim{opacity:.45}
.choice:disabled{cursor:default}

.numline{margin:14px 0 6px;text-align:center}
.numline svg{max-width:100%;height:auto}

.kaisetsu{background:var(--marker);border-radius:var(--radius);padding:16px 16px 14px;margin-top:14px;border:1.5px solid #EFDF9A;animation:pop .25s ease-out}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kaisetsu .kttl{font-family:var(--fd);font-weight:900;font-size:13px;color:#8A6D1A;margin-bottom:6px;letter-spacing:.08em}
.kaisetsu .kbody{font-size:14.5px;white-space:pre-line}
.nextbtn{width:100%;margin-top:14px;border:none;border-radius:var(--radius);background:var(--pen-blue);color:#fff;font-family:var(--fd);font-weight:700;font-size:16px;padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s}
.nextbtn:active{transform:scale(.98)}

.result{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:34px 20px;box-shadow:var(--shadow);text-align:center}
.result .score{font-family:var(--fd);font-weight:900;font-size:52px;color:var(--pen-blue-deep);margin:6px 0 2px}
.result .score b{color:var(--red)}
.result .msg{font-size:14.5px;color:var(--ink-soft);margin-bottom:20px;white-space:pre-line}
.bighanko{font-family:var(--fd);font-weight:900;color:var(--red);border:4px solid var(--red);border-radius:50%;width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-size:24px;transform:rotate(-14deg);margin:0 auto 16px;letter-spacing:.05em;background:rgba(224,64,42,.05);animation:stamp .35s cubic-bezier(.2,2.2,.6,1) both}
@keyframes stamp{from{transform:rotate(-14deg) scale(2.1);opacity:0}to{transform:rotate(-14deg) scale(1);opacity:1}}
button:focus-visible,.qitem:focus-visible{outline:3px solid var(--pen-blue);outline-offset:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
const G1="① |x| = a（きほん）", G1s="0からの距離が a の点 → 2つ";
const G2="② |x| < a（内側）", G2s="距離が a 未満 → 1本の範囲につながる";
const G3="③ |x| > a（外側）", G3s="距離が a より遠い → 2つの範囲に分かれる";
const G4="④ |x−c| = a（中心ずれ・方程式）", G4s="cからの距離が a の点 → 2つ";
const G5="⑤ |x−c| < a（中心ずれ・内側）", G5s="cを中心に前後 a の範囲";
const G6="⑥ |x−c| ≧ a（中心ずれ・外側）", G6s="cから離れた2方向に分かれる";

const PROBS = [
{g:G1, q:"|x| = 5", c:["x = ±5","x = 5","x = −5","解なし"], a:0,
 e:"0からの距離が5の点は、数直線上に2つある：5 と −5。\n→ x = ±5\n「= のときは±で2つに割れる」が基本の型。"},
{g:G1, q:"|x| = 7", c:["x = ±7","x = 7","x = 49","x = ±14"], a:0,
 e:"0からの距離が7の点 → 7 と −7 の2つ。\n→ x = ±7\n2乗すると49になる、と混同しないように（それは別の計算）。"},

{g:G2, q:"|x| < 3", c:["−3 < x < 3","x < 3","x < ±3","x < −3, 3 < x"], a:0,
 e:"0からの距離が3未満 → 0の近くのゾーン。\n→ −3 < x < 3\n「< は内側（はさまれる）」。0を中心に前後3の範囲。"},
{g:G2, q:"|x| < 5", c:["−5 < x < 5","−5 < x","x < 5","x < −5, 5 < x"], a:0,
 e:"0からの距離が5未満 → −5と5の間。\n→ −5 < x < 5\n両端の−5と5は「未満」なので含まない。"},

{g:G3, q:"|x| > 2", c:["x < −2, 2 < x","−2 < x < 2","x > 2","x > ±2"], a:0,
 e:"0からの距離が2より遠い → 0の近く以外の2方向。\n→ x < −2 または 2 < x\n「> は外側（2つに割れる）」。内側と正反対のイメージ。"},
{g:G3, q:"|x| ≧ 4", c:["x ≦ −4, 4 ≦ x","−4 ≦ x ≦ 4","x ≧ 4","x ≧ −4"], a:0,
 e:"0からの距離が4以上 → 4以上遠く離れた2方向。\n→ x ≦ −4 または 4 ≦ x\n「≧」なので−4と4自身も含む。"},

{g:G4, q:"|x − 3| = 5", c:["x = 8, −2","x = ±5","x = 8","x = 2, −8"], a:0,
 e:"「3からの距離が5の点」と考える。\n3 + 5 = 8、3 − 5 = −2\n→ x = 8, −2\nx − 3 = ±5 と割って、両方に3を足しても同じ答えになる。"},
{g:G4, q:"|x + 1| = 4", c:["x = 3, −5","x = ±4","x = 5, −3","x = 3, 5"], a:0,
 e:"|x+1| は |x−(−1)| と同じ、つまり「−1からの距離が4」。\n−1 + 4 = 3、−1 − 4 = −5\n→ x = 3, −5\n「+1」を見て中心を+1と勘違いしないこと。中心は−1。"},

{g:G5, q:"|x − 2| < 4", c:["−2 < x < 6","−4 < x < 4","2 < x < 4","−6 < x < 2"], a:0,
 e:"「2からの距離が4未満」→ 2を中心に前後4。\nまず −4 < x−2 < 4 の形にして、全部の辺に2を足す。\n−4+2=−2、4+2=6 → −2 < x < 6"},
{g:G5, q:"|x + 1| < 3", c:["−4 < x < 2","−3 < x < 3","−2 < x < 4","x < 2"], a:0,
 e:"「−1からの距離が3未満」。\n−3 < x+1 < 3 の形にして、全部の辺に1を引く。\n−3−1=−4、3−1=2 → −4 < x < 2"},

{g:G6, q:"|x − 1| ≧ 3", c:["x ≦ −2, 4 ≦ x","−2 ≦ x ≦ 4","x ≧ 4","x ≦ −2"], a:0,
 e:"「1からの距離が3以上」→ 1を中心に外側2方向。\nx−1 ≦ −3 または 3 ≦ x−1 の形にして、両方に1を足す。\n−3+1=−2、3+1=4 → x ≦ −2 または 4 ≦ x"},
{g:G6, q:"|x + 2| > 5", c:["x < −7, 3 < x","−7 < x < 3","x > 3","x < −7"], a:0,
 e:"「−2からの距離が5より遠い」。\nx+2 < −5 または 5 < x+2 の形にして、両方に2を引く。\n−5−2=−7、5−2=3 → x < −7 または 3 < x"}
];

const app = document.getElementById("app");
let progress = {};
let session = null;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function home(){
  session=null;
  const clearedCount = Object.keys(progress).filter(k=>progress[k]).length;
  let html=`
  <div class="header"><h1>絶対値<span class="roma">特訓</span></h1><div class="tag">距離のイメージで解く12問</div></div>
  <div class="statsbar">
    <div class="statcard"><div class="num"><b>${clearedCount}</b> / ${PROBS.length}</div><div class="lbl">正解した問題</div></div>
    <div class="statcard"><div class="num">${clearedCount===PROBS.length?"完了":"挑戦中"}</div><div class="lbl">進み具合</div></div>
  </div>
  <button class="bigbtn blue" onclick="startAll()">最初から順番に解く（12問）</button>
  <button class="bigbtn ghost" onclick="startShuffle()">シャッフルで通し</button>`;

  let curG="";
  PROBS.forEach((p,i)=>{
    if(p.g!==curG){
      curG=p.g;
      const subMap={[G1]:G1s,[G2]:G2s,[G3]:G3s,[G4]:G4s,[G5]:G5s,[G6]:G6s};
      html+=`<div class="groupttl">${esc(curG)}</div><div class="groupsub">${esc(subMap[curG])}</div>`;
    }
    html+=`<button class="qitem" onclick="startOne(${i})">
      <span class="no">問${i+1}</span>
      <span class="qinfo"><div class="qmini">${esc(p.q)}</div></span>
      ${progress[i]?'<span class="hanko">正解</span>':''}
    </button>`;
  });
  app.innerHTML=html;
  window.scrollTo(0,0);
}

function startAll(){session={list:PROBS.map((_,i)=>i),idx:0,correct:0,title:"通し練習"};renderQ()}
function startShuffle(){session={list:shuffle(PROBS.map((_,i)=>i)),idx:0,correct:0,title:"シャッフル練習"};renderQ()}
function startOne(i){session={list:[i],idx:0,correct:0,title:"1問だけ"};renderQ()}

function renderQ(){
  const s=session;
  const pi=s.list[s.idx];
  const p=PROBS[pi];
  const order=shuffle(p.c.map((_,i)=>i));
  s.currentOrder=order;
  const pct=Math.round(s.idx/s.list.length*100);
  const marks=["ア","イ","ウ","エ"];
  app.innerHTML=`
  <div class="qtop">
    <button class="backbtn" onclick="home()">← やめる</button>
    <div class="qtheme">${esc(s.title)}｜${esc(p.g)}</div>
    <div class="qcount">${s.idx+1} / ${s.list.length}</div>
  </div>
  <div class="progressline"><i style="width:${pct}%"></i></div>
  <div class="qcard">
    <span class="qlabel">問 ${pi+1}</span>
    <div class="qtext">${esc(p.q)}</div>
    <div class="markwrap" id="markwrap"></div>
  </div>
  <div class="choices">
    ${order.map((ci,vi)=>`<button class="choice" data-ci="${ci}" onclick="answer(${ci},this)">
      <span class="ck">${marks[vi]}</span><span>${esc(p.c[ci])}</span></button>`).join("")}
  </div>
  <div id="after"></div>`;
  window.scrollTo(0,0);
}

function answer(ci,btn){
  const s=session;
  const pi=s.list[s.idx];
  const p=PROBS[pi];
  const ok=ci===p.a;
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    const bci=Number(b.dataset.ci);
    if(bci===p.a)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrongpick");
    else b.classList.add("dim");
  });
  const mw=document.getElementById("markwrap");
  if(ok){
    s.correct++;progress[pi]=true;
    mw.innerHTML=`<svg viewBox="0 0 100 100"><circle class="mark-o" cx="50" cy="50" r="42"/></svg>`;
  }else{
    mw.innerHTML=`<svg viewBox="0 0 100 100"><path class="mark-x" d="M25 55 L45 75 L80 25" transform="rotate(8 50 50)"/></svg>`;
  }
  const last=s.idx===s.list.length-1;
  document.getElementById("after").innerHTML=`
    <div class="kaisetsu">
      <div class="kttl">${ok?"○ 正解！　解説でダメ押し":"惜しい！　ここで覚えれば勝ち"}</div>
      <div class="kbody">${esc(p.e)}</div>
    </div>
    <button class="nextbtn" onclick="next()">${last?"結果を見る":"次の問題へ →"}</button>`;
  document.querySelector(".nextbtn").focus();
}

function next(){
  session.idx++;
  if(session.idx>=session.list.length)renderResult();
  else renderQ();
}

function renderResult(){
  const s=session;
  const n=s.list.length;
  const perfect=s.correct===n;
  let msg;
  if(perfect)msg="全問正解！距離のイメージで\n絶対値はもう得意分野。";
  else if(s.correct>=n*0.6)msg="あと少し。間違えた問題は\n「1問だけ」で解き直そう。";
  else msg="「距離」のイメージに戻って、\nもう1周すると掴めるはず。";
  app.innerHTML=`
  <div class="header"><h1>絶対値<span class="roma">特訓</span></h1></div>
  <div class="result">
    ${perfect?'<div class="bighanko">合格</div>':''}
    <div class="score"><b>${s.correct}</b> / ${n}</div>
    <div class="msg">${esc(msg)}</div>
    <button class="bigbtn ${perfect?"ghost":"blue"}" onclick="retry()">もう一回挑戦</button>
    <button class="bigbtn ghost" onclick="home()">問題一覧にもどる</button>
  </div>`;
  window.scrollTo(0,0);
}
function retry(){
  const s=session;
  if(s.title==="シャッフル練習")startShuffle();
  else if(s.title==="1問だけ")startOne(s.list[0]);
  else startAll();
}

home();
</script>
</body>
</html>
